name: Release

# Three jobs in one workflow:
#   - "ci" runs on every PR + push: type-check + lint + unit tests + build.
#   - "e2e" runs on every PR + push against a real Postgres service container,
#     setting GUARDDOG_E2E=1 and GUARDDOG_DATABASE_URL so the flowchestra
#     example's end-to-end suite actually exercises RLS semantics. ADR-0013
#     requires real Postgres for the harness; we satisfy it here.
#   - "release" runs only on push to main. It either opens / updates a
#     "Version Packages" PR (when there are unreleased changesets) or, when
#     that PR has just been merged, publishes the new versions to GitHub
#     Packages. Gated on both `ci` and `e2e`.
#
# Security note: no step interpolates untrusted user input (PR titles, commit
# messages, etc.) into a run: command. Everything is from secrets, the
# pre-set github.* event metadata used in if: conditions, or hard-coded.
#
# See RELEASING.md for the manual / local publish path.

on:
  push:
    branches: [main]
  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@flowchestra'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Type-check
        run: pnpm -r run type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm -r run test

      - name: Build
        run: pnpm -r run build

      # Coverage lint is asserted by the example's `guarddog.test.ts`
      # ("passes lintCoverage against the seven-model Prisma list") which
      # runs in the `Test` step above. We previously also invoked the built
      # `dist/bin.cjs` here as an end-to-end bin smoke, but that path
      # resolves workspace deps via Node's loader — which hits the
      # workspace `exports: { import: "./src/index.ts" }` entries and then
      # falls over on the source's `from './foo.js'` ESM-on-TS imports.
      # The pack-and-install harness that handles this correctly belongs
      # in the publish dry-run flow (DoD #2.4 — handed off to the
      # publishing agent). Until that lands, the lint package's value-prop
      # is gated by the example's unit test alone.

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: guarddog
          POSTGRES_PASSWORD: guarddog
          POSTGRES_DB: guarddog_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guarddog -d guarddog_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@flowchestra'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Single command, same locally and in CI: `pnpm test:e2e` runs
      # scripts/e2e.sh, which detects GUARDDOG_DATABASE_URL is already set
      # (from the env block below) and skips booting its own Docker — the
      # service container above is already providing Postgres on :5432.
      # Locally with no env vars set, the same command boots a throwaway
      # postgres:16 container. One mental model for both environments.
      - name: Run all E2E suites against Postgres
        run: pnpm test:e2e
        env:
          GUARDDOG_E2E: '1'
          GUARDDOG_DATABASE_URL: postgres://guarddog:guarddog@localhost:5432/guarddog_e2e

  release:
    name: release
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@flowchestra'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm -r run build

      # Either open / update the "Version Packages" PR, or — if the version PR
      # was just merged — actually publish. changesets/action handles both.
      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
